<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공공기관 소관부서 및 사무분장 법령 통합 검증 엔진</title>
    <!-- Google Fonts: Outfit (English UI) & Noto Sans KR (Korean Text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS Styling -->
    <link rel="stylesheet" href="style.css">
    <!-- JSZip for client-side ZIP/HWPX reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Pako for client-side Deflate/HWP decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <!-- SheetJS for client-side Excel exporting -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Header Banner (Navy theme matching Python title block) -->
        <header class="app-header">
            <h1 class="header-title">공공기관 소관부서 및 사무분장 법령 통합 검증 엔진</h1>
            <div class="header-controls">
                <button id="themeToggleBtn" class="theme-toggle-btn" title="테마 변경">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Top Horizontal Control Panel -->
        <section class="top-control-panel">
            <!-- Row 1: Radio Buttons -->
            <div class="control-row">
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="govtType" value="central" id="radioCentral">
                        <span class="radio-custom"></span>
                        <span class="lbl-text">중앙행정기관(부처)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="govtType" value="local" id="radioLocal" checked>
                        <span class="radio-custom"></span>
                        <span class="lbl-text">지방자치단체</span>
                    </label>
                </div>
            </div>

            <!-- Row 2: Selectors -->
            <div class="control-row selectors-row">
                <div class="selector-field">
                    <label for="selectMain" class="field-label">기관/시도 선택:</label>
                    <div class="select-wrapper">
                        <select id="selectMain" class="form-select">
                            <!-- Dynamic Options -->
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <div class="selector-field" id="groupSub">
                    <label for="selectSub" class="field-label">상세 분류:</label>
                    <div class="select-wrapper">
                        <select id="selectSub" class="form-select">
                            <!-- Dynamic Options -->
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>
            </div>

            <!-- Row 3: Keyword & Buttons -->
            <div class="control-row actions-row">
                <div class="keyword-field">
                    <label for="inputKeyword" class="field-label"><i class="fa-solid fa-keyboard" style="margin-right: 6px; color: var(--primary-color);"></i>사무 검색어:</label>
                    <input type="text" id="inputKeyword" class="form-input" placeholder="예: 정보공개, 자동차민원" required autocomplete="off">
                </div>

                <div class="buttons-field">
                    <button id="btnSearchOrdin" class="btn btn-primary">
                        <i class="fa-solid fa-magnifying-glass"></i> 분장사무 검색
                    </button>
                    <button id="btnSearchJeongyeol" class="btn btn-secondary">
                        <i class="fa-solid fa-signature"></i> 사무전결 검색
                    </button>
                    <button id="btnStop" class="btn btn-danger" disabled>
                        중단
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Display Content Area (Spacious & Bottom-aligned) -->
        <main class="app-main-content">
            <!-- Tabs Switcher -->
            <div class="tabs-nav">
                <button id="tabBtnLogs" class="tab-btn active" data-tab="tabLogs">
                    <i class="fa-solid fa-list-check"></i> 실시간 추적 로그
                </button>
                <button id="tabBtnReport" class="tab-btn" data-tab="tabReport">
                    <i class="fa-solid fa-file-invoice"></i> 최종 분석 보고서
                </button>
            </div>

            <!-- Tab Contents Container -->
            <div class="tabs-body-container">
                <!-- Tab 1: Clean Light-themed Log Area -->
                <div id="tabLogs" class="tab-pane active">
                    <div class="log-view-panel">
                        <div class="log-header">
                            <span class="log-title"><i class="fa-solid fa-circle-nodes"></i> 실시간 분석 및 탐색 과정</span>
                            <button id="btnClearLog" class="clear-log-btn" title="로그 지우기">
                                <i class="fa-solid fa-trash-can"></i> 지우기
                            </button>
                        </div>
                        <div id="logOutput" class="log-body-text">
                            <div class="empty-welcome">
                                <i class="fa-solid fa-arrow-pointer wave-animation"></i>
                                <h3>데이터 대기 중...</h3>
                                <p>사무 검색어를 입력하고 정밀 추적을 시작해 주세요.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 2: Match Report Panel -->
                <div id="tabReport" class="tab-pane">
                    <div class="report-view-panel">
                        <!-- Counters summary -->
                        <div class="report-summary-indicators" id="reportSummaryCards" style="display: none;">
                            <div class="indicator-card card-blue">
                                <i class="fa-solid fa-building indicator-icon"></i>
                                <div class="indicator-info">
                                    <span class="indicator-val" id="countOrgs">0</span>
                                    <span class="indicator-lbl">매칭 기관</span>
                                </div>
                            </div>
                            <div class="indicator-card card-green">
                                <i class="fa-solid fa-file-contract indicator-icon"></i>
                                <div class="indicator-info">
                                    <span class="indicator-val" id="countLaws">0</span>
                                    <span class="indicator-lbl">근거 법규</span>
                                </div>
                            </div>
                            <div class="indicator-card card-red">
                                <i class="fa-solid fa-clipboard-list indicator-icon"></i>
                                <div class="indicator-info">
                                    <span class="indicator-val" id="countCases">0</span>
                                    <span class="indicator-lbl">소관 사무 건수</span>
                                </div>
                            </div>
                        </div>

                        <!-- Scraped matches body -->
                        <div id="reportOutput" class="report-body-text">
                            <div class="report-empty-welcome">
                                <i class="fa-solid fa-folder-open"></i>
                                <h3>분석 완료된 보고서가 없습니다</h3>
                                <p>검색이 성공적으로 종료되면 정밀 요약 보고서가 자동으로 구성됩니다.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Control Area -->
        <footer class="app-footer">
            <div class="footer-search-bar">
                <span class="search-lbl">결과 내 검색:</span>
                <div class="search-input-box">
                    <input type="text" id="inputResultSearch" class="search-input-field" placeholder="검색어 입력" disabled>
                    <button id="btnPrevMatch" class="search-nav-btn" disabled>이전</button>
                    <button id="btnNextMatch" class="search-nav-btn" disabled>다음</button>
                </div>
                <span id="labelSearchStatus" class="search-status-counter">0/0</span>
            </div>

            <div class="footer-download-btn-wrapper">
                <button id="btnDownloadExcel" class="btn btn-success" disabled>
                    엑셀 다운로드
                </button>
            </div>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="app.js?v=1.2"></script>
</body>
</html>
